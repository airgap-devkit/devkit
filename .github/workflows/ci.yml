name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1: Static validation ─────────────────────────────────────────────
  # Runs on every push/PR. No binaries needed — just source files.
  # Catches broken JSON, missing required fields, bad platform values,
  # and shell syntax errors before anything else runs.
  validate:
    name: Validate manifests & scripts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Init submodules (tools + prebuilt only)
        run: git submodule update --init tools prebuilt

      - name: Run validate-manifests.sh
        run: bash tests/validate-manifests.sh --verbose

  # ── Job 2: Server binary health check ────────────────────────────────────
  # Starts the prebuilt server binary and verifies the HTTP API responds
  # correctly. Runs on both Linux and Windows to catch platform regressions.
  server-health:
    name: Server health (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            binary: prebuilt/bin/devkit-server-linux-amd64
          - os: windows-latest
            binary: prebuilt/bin/devkit-server-windows-amd64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Init submodules (tools + prebuilt)
        shell: bash
        run: git submodule update --init tools prebuilt

      - name: Make binary executable (Linux)
        if: runner.os == 'Linux'
        run: chmod +x ${{ matrix.binary }}

      - name: Start server
        shell: bash
        run: |
          ./${{ matrix.binary }} \
            --tools tools \
            --prebuilt prebuilt \
            --port 8080 \
            --no-browser &
          echo "SERVER_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for server to be ready
        shell: bash
        run: |
          for i in $(seq 1 15); do
            curl -sf http://127.0.0.1:8080/health && echo "Server ready." && exit 0
            sleep 1
          done
          echo "ERROR: server did not become ready within 15 seconds" >&2
          exit 1

      - name: GET /health
        shell: bash
        run: curl -sf http://127.0.0.1:8080/health

      - name: GET /api/tools — verify tool discovery
        shell: bash
        run: |
          resp=$(curl -sf http://127.0.0.1:8080/api/tools)
          count=$(echo "$resp" | python3 -c "
          import json, sys
          tools = json.load(sys.stdin)
          print(len(tools))
          ")
          echo "Discovered $count tools"
          [ "$count" -gt 0 ] || { echo "ERROR: /api/tools returned no tools"; exit 1; }

      - name: GET /api/profiles — verify profiles endpoint
        shell: bash
        run: curl -sf http://127.0.0.1:8080/api/profiles

      - name: Stop server
        if: always()
        shell: bash
        run: kill "$SERVER_PID" 2>/dev/null || true
