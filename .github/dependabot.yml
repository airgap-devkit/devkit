version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/server"
    schedule:
      interval: "weekly"
      day: "monday"
    cooldown:
      default-days: 7
    labels: ["dependencies", "go"]

  - package-ecosystem: "pip"
    directory: "/packages/python"
    schedule:
      interval: "weekly"
      day: "monday"
    cooldown:
      default-days: 7
    labels: ["dependencies", "python"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    cooldown:
      default-days: 7
    labels: ["dependencies", "ci"]
