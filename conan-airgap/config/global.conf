# conan-airgap base global.conf
# Applied by `conan config install` on every target. Network-specific overlays
# under network/<type>/ may append or override these.

# Never attempt to update recipes/binaries from a remote during a build — an
# air-gapped host must resolve entirely from the local cache.
core:non_interactive=True

# Build from source only when a matching binary is genuinely missing; otherwise
# reuse what was seeded. (Callers can still pass --build explicitly.)
tools.system.package_manager:mode=check
