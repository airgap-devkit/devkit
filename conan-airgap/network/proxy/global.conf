# Network profile: proxy overlay.
# For an environment that can only reach an internal mirror through a corporate
# proxy. Replace the host/port, then this is applied on top of the base config.
core.net.http:proxies={"http": "http://REPLACE-ME.proxy.internal:8080", "https": "http://REPLACE-ME.proxy.internal:8080"}

# Trust the internal CA bundle if the proxy does TLS interception. Point this at
# the PEM file that ships with your environment (absolute path on the target).
# core.net.http:cacert_path=/etc/pki/tls/certs/internal-ca-bundle.pem
