<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{.Config.DevkitName}} — Logs</title>
<script nonce="{{nonce}}">(function(){var t=localStorage.getItem('devkit-theme')||'light';document.documentElement.setAttribute('data-theme',t);})();</script>
<link rel="stylesheet" href="/static/app.css">
</head>
<body>

<nav class="navbar">
  <div class="navbar-brand">
    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M14.25 9.75L16.5 12l-2.25 2.25m-4.5 0L7.5 12l2.25-2.25M6 20.25h12A2.25 2.25 0 0020.25 18V6A2.25 2.25 0 0018 3.75H6A2.25 2.25 0 003.75 6v12A2.25 2.25 0 006 20.25z"/>
    </svg>
    {{.Config.DevkitName}}
  </div>
  <div class="navbar-spacer"></div>
  <a href="/" class="btn btn-secondary btn-sm">← Dashboard</a>
</nav>

<div class="layout">
  <main class="main" style="margin-left:0">
    <div class="page-header">
      <div>
        <div class="page-title">Install Logs</div>
        <div class="page-subtitle">Recent installation activity on {{.OS}}</div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/></svg>
        <span class="card-title">Log files</span>
      </div>
      <div class="card-body">
        <p class="text-muted text-sm">
          Log files are written by individual <code>setup.sh</code> scripts. Check the tool's install directory for <code>INSTALL_LOG.txt</code>.
        </p>
        <div class="mt-4">
          <a href="/" class="btn btn-primary">← Back to Dashboard</a>
        </div>
      </div>
    </div>
  </main>
</div>

</body>
</html>
