# =============================================================================
# hooks.conf — Runtime configuration for clang-llvm-style-formatter
#
# This file is sourced by the pre-commit hook as plain Bash.
# Copy it to your host repository as .llvm-hooks/config/hooks.conf if you
# need per-repo overrides, or leave the submodule default in place.
#
# All values shown here are the defaults — you only need to set what differs.
# =============================================================================

# ---------------------------------------------------------------------------
# Tool enable/disable toggles
# ---------------------------------------------------------------------------

# Run clang-format on every staged C/C++ file.
# Set to "false" to disable entirely (not recommended).
ENABLE_FORMAT="true"

# Run clang-tidy on every staged C/C++ translation unit.
# Off by default because it requires compile_commands.json and is slow.
# Enable once your CMake build exports compile commands reliably.
ENABLE_TIDY="false"

# ---------------------------------------------------------------------------
# Binary paths
# Normally auto-discovered via find-tools.sh.
# Override here if your binaries live at a non-standard location, e.g.:
#   CLANG_FORMAT_BIN="/opt/llvm-17/bin/clang-format"
# ---------------------------------------------------------------------------
CLANG_FORMAT_BIN="clang-format"
CLANG_TIDY_BIN="clang-tidy"

# Minimum acceptable version of clang-format (major only).
# The hook will warn (but not fail) if the discovered version is older.
CLANG_FORMAT_MIN_VERSION="14"

# ---------------------------------------------------------------------------
# File targeting
# ---------------------------------------------------------------------------

# Comma-separated list of file extensions to check (no dots, no spaces).
CPP_EXTENSIONS="cpp,cxx,cc,c,h,hpp,hxx,hh"

# ---------------------------------------------------------------------------
# Behavior
# ---------------------------------------------------------------------------

# Print per-file diffs and verbose tool output.
VERBOSE="false"
