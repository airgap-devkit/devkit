repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: [--fix]
        files: ^packages/python/
      - id: ruff-format
        files: ^packages/python/

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  # gitleaks and trufflehog both honor .gitignore, so a credential parked in an
  # ignored dotfile (e.g. .pyirc) is invisible to them. This hook scans the whole
  # working tree regardless of ignore rules.
  - repo: local
    hooks:
      - id: full-tree-secret-scan
        name: full-tree secret scan (ignore-agnostic)
        entry: bash scripts/internal/secret-scan.sh
        language: system
        pass_filenames: false
        always_run: true
